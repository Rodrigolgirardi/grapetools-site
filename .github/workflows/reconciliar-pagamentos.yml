name: Reconciliar pagamentos

# Rede de segurança: chama o endpoint que confere no Pagar.me os pedidos ainda
# "nao_pago" e confirma os que já foram pagos (caso o webhook tenha falhado).
#
# Precisa de 2 secrets no repositório (Settings → Secrets and variables → Actions):
#   SITE_URL    -> ex.: https://grapetools.com.br  (sem barra no final)
#   CRON_SECRET -> o MESMO valor da env CRON_SECRET no Netlify
#
# Se algo precisar de atenção (cobrança não localizada / erro de API), o job FALHA
# de propósito para o GitHub te mandar um e-mail.

on:
  schedule:
    - cron: '*/20 * * * *' # a cada 20 min (horário UTC; execução é best-effort)
  workflow_dispatch: {} # botão "Run workflow" para rodar na hora

jobs:
  reconciliar:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar endpoint de reconciliação
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::Faltam os secrets SITE_URL e/ou CRON_SECRET no repositório."
            exit 1
          fi
          resp=$(curl -sS -w "\n%{http_code}" -X POST \
            -H "x-cron-key: $CRON_SECRET" \
            "$SITE_URL/api/cron/reconciliar")
          body=$(echo "$resp" | head -n -1)
          code=$(echo "$resp" | tail -n 1)
          echo "HTTP $code"
          echo "Resumo: $body"
          if [ "$code" != "200" ]; then
            echo "::error::Reconciliação retornou HTTP $code"
            exit 1
          fi
          if echo "$body" | grep -q '"needs_attention":true'; then
            echo "::error::Reconciliação sinalizou needs_attention=true — veja o resumo acima."
            exit 1
          fi
